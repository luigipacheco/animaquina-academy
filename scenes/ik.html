<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { TransformControls } from 'three/addons/controls/TransformControls.js';
  import GUI from 'lil-gui';

  // ── Scene globals ────────────────────────────────────────────────────────────
  let scene, camera, renderer, orbitControls, transformControls;
  let model, target;
  let bones = [];
  let boneLines = [];
  let gui, infoEl;

  // IK parameters (mutable via GUI)
  let maxIterations = 10;
  let tolerance     = 0.01;
  let damping       = 0.5;
  let ikEnabled     = true;

  // Canonical joint order (root → tip)
  const BONE_ORDER = ['joint_1','joint_2','joint_3','joint_4','joint_5','joint_6'];

  // Match FK scene: each joint rotates on a single axis only
  const jointConstraints = {
    joint_1: { axis:'y', min: THREE.MathUtils.degToRad(-170), max: THREE.MathUtils.degToRad( 170) },
    joint_2: { axis:'x', min: THREE.MathUtils.degToRad(-190), max: THREE.MathUtils.degToRad(  45) },
    joint_3: { axis:'x', min: THREE.MathUtils.degToRad(-120), max: THREE.MathUtils.degToRad( 156) },
    joint_4: { axis:'y', min: THREE.MathUtils.degToRad(-185), max: THREE.MathUtils.degToRad( 185) },
    joint_5: { axis:'x', min: THREE.MathUtils.degToRad(-120), max: THREE.MathUtils.degToRad( 120) },
    joint_6: { axis:'y', min: THREE.MathUtils.degToRad(-350), max: THREE.MathUtils.degToRad( 350) },
  };

  // Rest pose angles (delta from GLTF bind pose, in degrees)
  const initialPose = {
    joint_1:   0,
    joint_2:   0,
    joint_3:   0,
    joint_4:   0,
    joint_5:   0,
    joint_6:   0,
  };

  // Bind-pose quaternions stored at load time — all pose/constraint work is
  // done as deltas ON TOP of these so we never clobber the GLTF bind offsets.
  const bindQuaternions = new Map();

  // ── Joint constraint ─────────────────────────────────────────────────────────
  // Constrain the DELTA from the bind pose, not the absolute quaternion.
  // This preserves any bind-pose offsets baked into the GLTF (e.g. a 90° X
  // rotation on joint_1 from Blender's Z-up → Y-up export conversion).
  function applyJointConstraint(bone) {
    const c      = jointConstraints[bone.name];
    if (!c) return;

    const bindQ    = bindQuaternions.get(bone.name) ?? new THREE.Quaternion();
    const bindQInv = bindQ.clone().invert();

    // deltaQ = bindQ⁻¹ · currentQ  (rotation relative to the bind pose)
    const deltaQ = new THREE.Quaternion().multiplyQuaternions(bindQInv, bone.quaternion);

    // Decompose delta, zero off-axes, clamp the allowed axis
    const euler = new THREE.Euler().setFromQuaternion(deltaQ, 'XYZ');
    if (c.axis !== 'x') euler.x = 0;
    if (c.axis !== 'y') euler.y = 0;
    if (c.axis !== 'z') euler.z = 0;
    euler[c.axis] = Math.max(c.min, Math.min(c.max, euler[c.axis]));

    // Reconstruct: bindQ · constrainedDelta
    const constrainedDelta = new THREE.Quaternion().setFromEuler(euler);
    bone.quaternion.multiplyQuaternions(bindQ, constrainedDelta);
  }

  // ── CCD IK solver ────────────────────────────────────────────────────────────
  //
  // Cyclic Coordinate Descent (end → root):
  //   For each bone (skipping the end effector itself), compute the world-space
  //   rotation that would swing the end effector toward the target, then
  //   convert that world-space delta into the bone's LOCAL space before applying.
  //
  // Key formula:
  //   world = parent.worldQ * local
  //   ∴ localDelta = parent.worldQ⁻¹ · worldDelta · parent.worldQ
  //   new local  = localDelta · old local  (premultiply)
  //
  function solveIK() {
    if (!bones.length || !target || !model) return 0;

    const targetPos = target.position.clone();
    const endBone   = bones[bones.length - 1]; // joint_6 is the end effector

    let dist = Infinity;

    for (let iter = 0; iter < maxIterations; iter++) {
      // Refresh all world matrices before reading positions
      model.updateMatrixWorld(true);

      const endPos = endBone.getWorldPosition(new THREE.Vector3());
      dist = endPos.distanceTo(targetPos);
      if (dist < tolerance) break;

      // Iterate bones from joint_5 back to joint_1
      // (rotating joint_6 doesn't move joint_6's own world position)
      for (let i = bones.length - 2; i >= 0; i--) {
        const bone = bones[i];

        // Recompute world matrices so positions are accurate after previous step
        model.updateMatrixWorld(true);

        const bonePos = bone.getWorldPosition(new THREE.Vector3());
        const endPos  = endBone.getWorldPosition(new THREE.Vector3());

        const toEnd    = endPos.clone().sub(bonePos);
        const toTarget = targetPos.clone().sub(bonePos);

        // Skip degenerate cases
        if (toEnd.lengthSq() < 1e-10 || toTarget.lengthSq() < 1e-10) continue;
        toEnd.normalize();
        toTarget.normalize();

        const dot = Math.min(1.0, Math.max(-1.0, toEnd.dot(toTarget)));
        if (dot > 1.0 - 1e-6) continue; // already pointing at target

        // ── World-space delta rotation ──────────────────────────────────────
        const worldDelta = new THREE.Quaternion().setFromUnitVectors(toEnd, toTarget);

        // Apply damping: slerp from identity toward the full delta
        // damping=1 → full step, damping=0.1 → very small cautious step
        const dampedDelta = new THREE.Quaternion().slerp(worldDelta, damping);

        // ── Convert world delta → bone local space ──────────────────────────
        //   localDelta = parentWorldQ⁻¹ · dampedDelta · parentWorldQ
        const parentWorldQ    = new THREE.Quaternion();
        if (bone.parent) bone.parent.getWorldQuaternion(parentWorldQ);
        const parentWorldQInv = parentWorldQ.clone().invert();

        const localDelta = new THREE.Quaternion().multiplyQuaternions(
          new THREE.Quaternion().multiplyQuaternions(parentWorldQInv, dampedDelta),
          parentWorldQ
        );

        // ── Apply and constrain ─────────────────────────────────────────────
        // premultiply: new local = localDelta · old local
        bone.quaternion.premultiply(localDelta);
        applyJointConstraint(bone);
        bone.updateMatrix(); // mark local matrix dirty for next updateMatrixWorld
      }
    }

    return dist;
  }

  // ── Bone visualisation lines ─────────────────────────────────────────────────
  function createBoneLines() {
    boneLines.forEach(({ line }) => scene.remove(line));
    boneLines = [];

    for (let i = 0; i < bones.length - 1; i++) {
      const pts = [
        bones[i].getWorldPosition(new THREE.Vector3()),
        bones[i + 1].getWorldPosition(new THREE.Vector3()),
      ];
      const geo  = new THREE.BufferGeometry().setFromPoints(pts);
      const mat  = new THREE.LineBasicMaterial({ color: 0x00ff88 });
      const line = new THREE.Line(geo, mat);
      scene.add(line);
      boneLines.push({ line, a: bones[i], b: bones[i + 1] });
    }
  }

  function updateBoneLines() {
    boneLines.forEach(({ line, a, b }) => {
      const pos = line.geometry.attributes.position;
      const p1  = a.getWorldPosition(new THREE.Vector3());
      const p2  = b.getWorldPosition(new THREE.Vector3());
      pos.setXYZ(0, p1.x, p1.y, p1.z);
      pos.setXYZ(1, p2.x, p2.y, p2.z);
      pos.needsUpdate = true;
    });
  }

  // ── Target sphere ─────────────────────────────────────────────────────────────
  function createTarget() {
    // Yellow sphere
    target = new THREE.Mesh(
      new THREE.SphereGeometry(0.07, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xffdd00 })
    );
    // Orange ring
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.13, 0.012, 8, 24),
      new THREE.MeshBasicMaterial({ color: 0xff8800 })
    );
    target.add(ring);
    scene.add(target);

    // Attach transform gizmo so the user can drag the target
    transformControls = new TransformControls(camera, renderer.domElement);
    transformControls.attach(target);
    transformControls.setSize(0.65);
    transformControls.addEventListener('dragging-changed', e => {
      orbitControls.enabled = !e.value;
    });
    scene.add(transformControls);
  }

  // ── GUI ───────────────────────────────────────────────────────────────────────
  function createGUI() {
    gui = new GUI({ width: 260, title: 'IK Controls' });

    const solver = gui.addFolder('Solver');
    const p = { ikEnabled, maxIterations, tolerance, damping };
    solver.add(p, 'ikEnabled').name('Enabled')
      .onChange(v => { ikEnabled = v; });
    solver.add(p, 'maxIterations', 1, 30, 1).name('Iterations')
      .onChange(v => maxIterations = v);
    solver.add(p, 'tolerance', 0.001, 0.1, 0.001).name('Tolerance')
      .onChange(v => tolerance = v);
    solver.add(p, 'damping', 0.05, 1.0, 0.05).name('Damping')
      .onChange(v => damping = v);
    solver.open();

    const target = gui.addFolder('Target');
    const tCtrl = { mode: 'translate' };
    target.add(tCtrl, 'mode', ['translate', 'rotate']).name('Gizmo mode')
      .onChange(v => transformControls.setMode(v));
    target.open();

    const actions = gui.addFolder('Actions');
    actions.add({ reset: resetPose }, 'reset').name('Reset pose');
    actions.open();
  }

  // ── Info overlay ──────────────────────────────────────────────────────────────
  function createInfoOverlay() {
    infoEl = document.createElement('div');
    infoEl.id = 'ik-info';
    document.body.appendChild(infoEl);
  }

  function updateInfoOverlay(dist) {
    if (!infoEl || !bones.length) return;
    const rows = bones
      .filter(b => jointConstraints[b.name])
      .map(b => {
        const c      = jointConstraints[b.name];
        const bindQ  = bindQuaternions.get(b.name) ?? new THREE.Quaternion();
        const deltaQ = new THREE.Quaternion().multiplyQuaternions(bindQ.clone().invert(), b.quaternion);
        const euler  = new THREE.Euler().setFromQuaternion(deltaQ, 'XYZ');
        const deg    = THREE.MathUtils.radToDeg(euler[c.axis]).toFixed(1);
        const lbl    = b.name.replace('joint_', 'J');
        return `<span class="jlabel">${lbl}</span><span class="jval">${deg}°</span>`;
      })
      .join('');

    const reached = dist < tolerance;
    infoEl.innerHTML =
      `<div class="info-title">IK Status</div>` +
      `<div class="info-row"><span>distance</span><span class="${reached ? 'ok' : 'warn'}">${dist.toFixed(4)}</span></div>` +
      `<div class="info-divider"></div>` +
      `<div class="joints">${rows}</div>`;
  }

  // ── Pose helpers ──────────────────────────────────────────────────────────────
  function applyInitialPose() {
    bones.forEach(bone => {
      const c   = jointConstraints[bone.name];
      const deg = initialPose[bone.name] ?? 0;
      if (!c) return;

      // Start from bind pose, then apply initial angle as a delta on the constraint axis
      const bindQ = bindQuaternions.get(bone.name) ?? new THREE.Quaternion();
      const deltaEuler = new THREE.Euler(0, 0, 0, 'XYZ');
      deltaEuler[c.axis] = THREE.MathUtils.degToRad(deg);
      const deltaQ = new THREE.Quaternion().setFromEuler(deltaEuler);
      bone.quaternion.multiplyQuaternions(bindQ, deltaQ);
      bone.updateMatrix();
    });
    model.updateMatrixWorld(true);
  }

  function resetPose() {
    // Restore exact bind-pose quaternions, then reposition the target
    bones.forEach(bone => {
      const bindQ = bindQuaternions.get(bone.name);
      if (bindQ) { bone.quaternion.copy(bindQ); bone.updateMatrix(); }
    });
    model.updateMatrixWorld(true);
    const endBone = bones[bones.length - 1];
    target.position.copy(endBone.getWorldPosition(new THREE.Vector3()));
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  function init() {
    // Scene
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d0d0d);
    scene.fog = new THREE.FogExp2(0x0d0d0d, 0.04);

    // Camera
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 4, 9);

    // Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Controls
    orbitControls = new OrbitControls(camera, renderer.domElement);
    orbitControls.enableDamping  = true;
    orbitControls.dampingFactor  = 0.05;
    orbitControls.minDistance    = 1;
    orbitControls.maxDistance    = 20;

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(5, 8, 5);
    dir.castShadow = true;
    scene.add(dir);

    // Grid floor
    scene.add(new THREE.GridHelper(12, 24, 0x2a2a2a, 0x1a1a1a));

    // Target + info
    createTarget();
    createInfoOverlay();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Load model
    const loader = new GLTFLoader();
    loader.load('{{ site.baseurl }}/assets/scene/newsimple.glb',
      gltf => {
        // Centre + normalise scale
        const box    = new THREE.Box3().setFromObject(gltf.scene);
        const centre = box.getCenter(new THREE.Vector3());
        gltf.scene.position.sub(centre);
        const size  = box.getSize(new THREE.Vector3());
        const scale = 2 / Math.max(size.x, size.y, size.z);
        gltf.scene.scale.multiplyScalar(scale);

        scene.add(gltf.scene);
        model = gltf.scene;

        // Collect bones in canonical order
        const boneMap = new Map();
        model.traverse(obj => { if (obj.isBone) boneMap.set(obj.name, obj); });
        BONE_ORDER.forEach(name => { if (boneMap.has(name)) bones.push(boneMap.get(name)); });
        console.log('IK chain:', bones.map(b => b.name).join(' → '));

        // Store bind-pose quaternions BEFORE touching anything
        bones.forEach(b => bindQuaternions.set(b.name, b.quaternion.clone()));

        // Set rest pose then place target at the end effector
        applyInitialPose();
        const endBone = bones[bones.length - 1];
        target.position.copy(endBone.getWorldPosition(new THREE.Vector3()));

        createBoneLines();
        createGUI();
      },
      undefined,
      err => console.error('GLB load error:', err)
    );
  }

  // ── Render loop ───────────────────────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    orbitControls.update();

    let dist = 0;
    if (model && target && ikEnabled) {
      dist = solveIK();
      updateBoneLines();
    }

    updateInfoOverlay(dist);
    renderer.render(scene, camera);
  }

  init();
  animate();
</script>
